# Cloud Build — rama main → servicio sonqo-prod (producción)
steps:
  # 1. Build de la imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag=southamerica-west1-docker.pkg.dev/$PROJECT_ID/sonqo-images/sonqo-web:$SHORT_SHA'
      - '--tag=southamerica-west1-docker.pkg.dev/$PROJECT_ID/sonqo-images/sonqo-web:prod-latest'
      # Variables públicas (no secretas) horneadas en build.
      - '--build-arg=PUBLIC_SUPABASE_URL=$_PUBLIC_SUPABASE_URL'
      - '--build-arg=PUBLIC_SUPABASE_ANON_KEY=$_PUBLIC_SUPABASE_ANON_KEY'
      - '--build-arg=PUBLIC_SANITY_PROJECT_ID=$_PUBLIC_SANITY_PROJECT_ID'
      - '--build-arg=SANITY_DATASET=production'
      - '--build-arg=PUBLIC_MP_PUBLIC_KEY=$_PUBLIC_MP_PUBLIC_KEY'
      - '.'

  # 2. Push al Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'southamerica-west1-docker.pkg.dev/$PROJECT_ID/sonqo-images/sonqo-web'

  # 3. Deploy a Cloud Run (producción)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sonqo-prod'
      - '--image=southamerica-west1-docker.pkg.dev/$PROJECT_ID/sonqo-images/sonqo-web:$SHORT_SHA'
      - '--region=southamerica-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=30s'
      - '--set-env-vars=NODE_ENV=production'
      # Secretos de Secret Manager. MP y Sanity se agregan cuando existan sus keys de producción.
      # - re-agregar luego: ,SANITY_API_TOKEN=SANITY_API_TOKEN:latest,MP_ACCESS_TOKEN=MP_ACCESS_TOKEN_PROD:latest,MP_WEBHOOK_SECRET=MP_WEBHOOK_SECRET:latest
      - '--update-secrets=RESEND_API_KEY=RESEND_API_KEY:latest,RESEND_FROM=RESEND_FROM_PROD:latest,RESEND_TO=RESEND_TO:latest,UPSTASH_REDIS_REST_URL=UPSTASH_REDIS_REST_URL:latest,UPSTASH_REDIS_REST_TOKEN=UPSTASH_REDIS_REST_TOKEN:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest'

substitutions:
  _PUBLIC_SUPABASE_URL: 'https://cfnsfvohxxomtnbmppoo.supabase.co'
  _PUBLIC_SUPABASE_ANON_KEY: 'sb_publishable_54tw4I_LpZhAZOCw5IThYA_LENcPCW9'
  _PUBLIC_SANITY_PROJECT_ID: 'placeholder'   # reemplazar cuando exista el proyecto Sanity
  _PUBLIC_MP_PUBLIC_KEY: ''                   # vacío: checkout muestra placeholder hasta tener keys MP

options:
  logging: CLOUD_LOGGING_ONLY
